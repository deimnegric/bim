<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ya rabBİM</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0b0b">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>

    <style>
        :root { --bg: #0b0b0b; --card: #161616; --accent: #2ecc71; --red: #ff4d4d; --yellow: #f1c40f; --blue: #00d2ff; --text: #f0f0f0; --gray: #666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 15px 15px 15px 15px; margin: 0; user-select: none; padding-bottom: 150px; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; }
        h2 { text-align: center; color: var(--accent); margin: 20px 0; letter-spacing: 3px; font-weight: 700; }
        
        #adminPanel, #filterSection { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid #222; margin-bottom: 15px; }
        #adminPanel { display: none; }
        
        input, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; font-size: 16px; }
        
        .tag-group { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .tag-group::-webkit-scrollbar { display: none; }
        
        .tag-btn { padding: 8px 14px; font-size: 12px; background: #222; border: 1px solid #333; color: #999; border-radius: 8px; white-space: nowrap; width: auto; font-weight: 600; cursor: pointer; transition: 0.2s; }
        
        /* Aktif Filtre Renkleri */
        .tag-btn.active[data-color="red"] { border-color: var(--red); color: var(--red); background: rgba(255, 77, 77, 0.1); }
        .tag-btn.active[data-color="green"] { border-color: var(--accent); color: var(--accent); background: rgba(46, 204, 113, 0.1); }
        .tag-btn.active[data-color="yellow"] { border-color: var(--yellow); color: var(--yellow); background: rgba(241, 196, 15, 0.1); }
        .tag-btn.active[data-color="blue"] { border-color: var(--blue); color: var(--blue); background: rgba(0, 210, 255, 0.1); }

        .add-btn { background: var(--accent); border: none; font-weight: 800; color: #000; cursor: pointer; }
        
        .task-item { background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .group-tag { font-weight: 800; text-transform: uppercase; margin-right: 6px; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid currentColor; }
        .tag-red { color: var(--red); } .tag-green { color: var(--accent); } .tag-yellow { color: var(--yellow); } .tag-blue { color: var(--blue); }
        .meta-data { font-size: 11px; color: var(--gray); margin-top: 4px; }
        
        .auth-link { text-align: center; color: #333; font-size: 12px; margin: 30px 0; cursor: pointer; }

        #notificationPrompt { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; padding: 25px; border-top: 3px solid var(--accent); box-sizing: border-box; z-index: 10000; display: none; text-align: center; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <h2>ya rabBİM</h2>
    
    <div id="adminPanel">
        <input type="text" id="taskTitle" placeholder="Başlık...">
        <div class="tag-group" id="adminTags">
            <button class="tag-btn" data-color="red" onclick="selectAdminGroup('Satıştan Çıktı', 'red', this)">Satıştan Çıktı</button>
            <button class="tag-btn" data-color="green" onclick="selectAdminGroup('Kampanya', 'green', this)">Kampanya</button>
            <button class="tag-btn" data-color="yellow" onclick="selectAdminGroup('Bilgi', 'yellow', this)">Bilgi</button>
            <button class="tag-btn" data-color="blue" onclick="selectAdminGroup('Mağaza', 'blue', this)">Mağaza</button>
        </div>
        <input type="datetime-local" id="taskTime">
        <button class="add-btn" onclick="saveTask()">LİSTEYE EKLE</button>
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <input type="text" id="manualNotifyBody" placeholder="Duyuru mesajı...">
        <button class="add-btn" style="background: var(--blue);" onclick="sendManualNotification()">DUYURU AT</button>
    </div>

    <div id="filterSection">
        <input type="text" id="searchInput" placeholder="Görevlerde ara..." oninput="render()">
        <div class="tag-group" id="filterTags">
            <button class="tag-btn" data-color="red" onclick="toggleFilter('Satıştan Çıktı', 'red', this)">Satıştan Çıktı</button>
            <button class="tag-btn" data-color="green" onclick="toggleFilter('Kampanya', 'green', this)">Kampanya</button>
            <button class="tag-btn" data-color="yellow" onclick="toggleFilter('Bilgi', 'yellow', this)">Bilgi</button>
            <button class="tag-btn" data-color="blue" onclick="toggleFilter('Mağaza', 'blue', this)">Mağaza</button>
        </div>
    </div>

    <div id="taskList"></div>
    
    <div id="authBtn" class="auth-link" onclick="handleAuth()">Yönetici Girişi</div>
</div>

<div id="notificationPrompt">
    <p style="margin: 0 0 15px 0; color: #fff;">Duyuruları kaçırmamak için bildirimleri aç kanki!</p>
    <button onclick="requestNotificationPermission()" style="background: var(--accent); color: #000; font-weight: bold; width: auto; padding: 10px 30px; border:none; border-radius:8px;">BİLDİRİMLERİ AÇ</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB40uhJRRzf-7_Id7__l5babzus4u_U3Zg",
        authDomain: "ya-rabbim.firebaseapp.com",
        databaseURL: "https://ya-rabbim-default-rtdb.firebaseio.com",
        projectId: "ya-rabbim",
        storageBucket: "ya-rabbim.firebasestorage.app",
        messagingSenderId: "1012195345128",
        appId: "1:1012195345128:web:4095d72243f9e0d5d8bf5d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messaging = firebase.messaging();
    const SERVER_KEY = "A5ad65b44b6226d86d257652ee8d2d9f8958e213"; 

    let tasks = [];
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let currentFilter = ""; 
    let adminSelectedGroup = "";
    let adminSelectedColor = "";

    function init() {
        updateUI();
        setTimeout(checkPermission, 2000);
        db.ref('tasks').on('value', (snapshot) => {
            const data = snapshot.val();
            tasks = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
            render();
        });
    }

    function checkPermission() {
        if (Notification.permission !== 'granted') {
            document.getElementById('notificationPrompt').style.display = 'block';
        }
    }

    async function requestNotificationPermission() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const reg = await navigator.serviceWorker.register('sw.js');
                const token = await messaging.getToken({ serviceWorkerRegistration: reg, vapidKey: "fgArsp94qOXNNZ50gDmLJGONzI99X_WOwnqJrCA-HQ4" });
                if (token) {
                    await db.ref('tokens').child(token).set(true);
                    document.getElementById('notificationPrompt').style.display = 'none';
                    alert("Bildirimler aktif!");
                }
            }
        } catch (err) { alert("Hata: " + err); }
    }

    // Filtreleme Fonksiyonu
    function toggleFilter(groupName, color, btn) {
        if (currentFilter === groupName) {
            currentFilter = "";
            btn.classList.remove('active');
        } else {
            currentFilter = groupName;
            document.querySelectorAll('#filterTags .tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        render();
    }

    // Admin Kategori Seçimi
    function selectAdminGroup(name, color, btn) {
        adminSelectedGroup = name;
        adminSelectedColor = color;
        document.querySelectorAll('#adminTags .tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function updateUI() {
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('authBtn').innerText = isAdmin ? "Çıkış Yap" : "Yönetici Girişi";
    }

    function handleAuth() {
        if (isAdmin) {
            isAdmin = false; localStorage.setItem('isAdmin', 'false');
        } else {
            if (prompt("Şifre:") === "2407") { isAdmin = true; localStorage.setItem('isAdmin', 'true'); }
        }
        updateUI(); render();
    }

    async function saveTask() {
        const t = document.getElementById('taskTitle');
        if (!t.value.trim() || !adminSelectedGroup) { alert("Başlık ve Kategori seç kanki!"); return; }
        
        const taskData = {
            title: t.value, 
            group: adminSelectedGroup, 
            groupColor: adminSelectedColor,
            time: document.getElementById('taskTime').value,
            created: new Date().toLocaleString('tr-TR')
        };
        db.ref('tasks').push(taskData);
        sendPushNotification("Yeni Kayıt", `[${adminSelectedGroup}] ${t.value}`);
        t.value = "";
    }

    async function sendPushNotification(title, body) {
        const tokensSnap = await db.ref('tokens').once('value');
        const tokens = tokensSnap.val();
        if (!tokens) return;
        Object.keys(tokens).forEach(token => {
            fetch('https://fcm.googleapis.com/fcm/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'key=' + SERVER_KEY },
                body: JSON.stringify({ to: token, notification: { title, body, icon: "logo.png" } })
            });
        });
    }

    async function sendManualNotification() {
        const m = document.getElementById('manualNotifyBody');
        if (!m.value) return;
        await sendPushNotification("Duyuru", m.value);
        alert("Fırlatıldı!");
        m.value = "";
    }

    function deleteTask(id) { if(isAdmin && confirm('Silinsin mi?')) db.ref('tasks').child(id).remove(); }

    function render() {
        const list = document.getElementById('taskList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        const filtered = tasks.filter(t => {
            const matchesSearch = t.title.toLowerCase().includes(search);
            const matchesFilter = currentFilter === "" || t.group === currentFilter;
            return matchesSearch && matchesFilter;
        });

        filtered.sort((a,b) => b.id > a.id ? 1 : -1).forEach(item => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div>
                    <div><span class="group-tag tag-${item.groupColor}">${item.group}</span> <b>${item.title}</b></div>
                    <div class="meta-data">📅 ${item.created} ${item.time ? ` | 🔔 ${item.time.replace('T', ' ')}` : ''}</div>
                </div>
                ${isAdmin ? `<button onclick="deleteTask('${item.id}')" style="width:auto; background:none; border:none; color:red; cursor:pointer; font-size:20px;">✕</button>` : ''}
            `;
            list.appendChild(div);
        });

        if (filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--gray); margin-top:20px;">Kayıt bulunamadı.</div>`;
        }
    }
</script>
</body>
</html>
