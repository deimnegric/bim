<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ya rabBİM</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0b0b">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>

    <style>
        :root { --bg: #0b0b0b; --card: #161616; --accent: #2ecc71; --red: #ff4d4d; --yellow: #f1c40f; --blue: #00d2ff; --text: #f0f0f0; --gray: #666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 15px 15px 15px; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; }
        h2 { text-align: center; color: var(--accent); margin: 20px 0; letter-spacing: 3px; font-weight: 700; }
        
        #adminPanel, #filterSection { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid #222; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #adminPanel { order: 1; display: none; }
        #filterSection { order: 2; }
        #taskList { order: 3; }

        input, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: var(--accent); }
        
        .tag-group { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .tag-btn { padding: 8px 14px; font-size: 12px; background: #222; border: 1px solid #333; cursor: pointer; color: #999; border-radius: 8px; white-space: nowrap; width: auto; font-weight: 600; }
        .tag-btn.active.red { border-color: var(--red); color: var(--red); background: rgba(255,77,77,0.1); }
        .tag-btn.active.green { border-color: var(--accent); color: var(--accent); background: rgba(46,204,113,0.1); }
        .tag-btn.active.yellow { border-color: var(--yellow); color: var(--yellow); background: rgba(241,196,15,0.1); }
        .tag-btn.active.blue { border-color: var(--blue); color: var(--blue); background: rgba(0,210,255,0.1); }

        .add-btn { background: var(--accent); border: none; font-weight: 800; color: #000; cursor: pointer; }
        .notify-btn { background: var(--blue); border: none; font-weight: 800; color: #000; margin-top: 5px; }

        .task-item { background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .task-item.pinned { border-left: 5px solid var(--yellow); background: #1a1a10; }
        .task-info { flex-grow: 1; }
        .group-tag { font-weight: 800; text-transform: uppercase; margin-right: 6px; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid currentColor; }
        .tag-red { color: var(--red); } .tag-green { color: var(--accent); } .tag-yellow { color: var(--yellow); } .tag-blue { color: var(--blue); }
        .meta-data { font-size: 11px; color: var(--gray); margin-top: 4px; }
        
        .auth-link { text-align: center; color: #333; font-size: 12px; margin: 30px 0; cursor: pointer; order: 4; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <h2>ya rabBİM</h2>
    
    <div id="adminPanel">
        <input type="text" id="taskTitle" placeholder="Bugün ne yapıyoruz?">
        <div class="tag-group">
            <button class="tag-btn" id="btn-red" onclick="setGroup('Satıştan Çıktı', 'red')">Satıştan Çıktı</button>
            <button class="tag-btn" id="btn-green" onclick="setGroup('Kampanya', 'green')">Kampanya</button>
            <button class="tag-btn" id="btn-yellow" onclick="setGroup('Bilgi', 'yellow')">Bilgi</button>
            <button class="tag-btn" id="btn-blue" onclick="setGroup('Mağaza', 'blue')">Mağaza</button>
        </div>
        <input type="datetime-local" id="taskTime">
        <button class="add-btn" onclick="saveTask()">LİSTEYE FIRLAT</button>
        
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <input type="text" id="manualNotifyBody" placeholder="Anlık duyuru mesajı...">
        <button class="notify-btn" onclick="sendManualNotification()">HERKESE BİLDİRİM AT</button>
    </div>

    <div id="filterSection">
        <input type="text" id="searchInput" placeholder="Görevlerde ara..." oninput="render()">
    </div>

    <div id="taskList"></div>
    <div id="authBtn" class="auth-link" onclick="handleAuth()">Sisteme Giriş Yap</div>
</div>

<script>
    // --- FIREBASE AYARLARI ---
    const firebaseConfig = {
        apiKey: "AIzaSyB40uhJRRzf-7_Id7__l5babzus4u_U3Zg",
        authDomain: "ya-rabbim.firebaseapp.com",
        databaseURL: "https://ya-rabbim-default-rtdb.firebaseio.com",
        projectId: "ya-rabbim",
        storageBucket: "ya-rabbim.firebasestorage.app",
        messagingSenderId: "1012195345128",
        appId: "1:1012195345128:web:4095d72243f9e0d5d8bf5d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messaging = firebase.messaging();

    // !!! BURAYA PANELDEKİ SERVER KEY'İ KOY !!!
    const SERVER_KEY = "BURAYA_SERVER_KEY_GELECEK"; 

    let tasks = [];
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let selectedGroup = ""; 
    let selectedColor = "";

    function init() {
        updateUI();
        db.ref('tasks').on('value', (snapshot) => {
            const data = snapshot.val();
            tasks = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
            render();
        });
        setupNotifications();
    }

    function setupNotifications() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then((reg) => {
                messaging.getToken({ 
                    serviceWorkerRegistration: reg, 
                    vapidKey: "fgArsp94qOXNNZ50gDmLJGONzI99X_WOwnqJrCA-HQ4" 
                }).then((token) => {
                    if (token) db.ref('tokens').child(token).set(true);
                });
            }).catch(err => console.log("SW Error:", err));
        }
    }

    function updateUI() {
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('authBtn').innerText = isAdmin ? "Yönetici Çıkışı" : "Sisteme Giriş Yap";
    }

    function handleAuth() {
        if (isAdmin) {
            isAdmin = false; localStorage.setItem('isAdmin', 'false');
        } else {
            if (prompt("Şifre:") === "2407") { isAdmin = true; localStorage.setItem('isAdmin', 'true'); }
        }
        updateUI(); render();
    }

    function setGroup(name, color) {
        selectedGroup = name; selectedColor = color;
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active', 'red', 'green', 'yellow', 'blue'));
        document.getElementById('btn-' + color).classList.add('active', color);
    }

    async function saveTask() {
        const titleInput = document.getElementById('taskTitle');
        const timeInput = document.getElementById('taskTime');
        if (!titleInput.value.trim()) return;

        const taskData = {
            title: titleInput.value, group: selectedGroup, groupColor: selectedColor,
            time: timeInput.value, isPinned: false, 
            created: new Date().toLocaleString('tr-TR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
        };

        db.ref('tasks').push(taskData);
        sendPushNotification("Yeni Görev", titleInput.value);
        
        titleInput.value = ""; timeInput.value = "";
        selectedGroup = ""; selectedColor = "";
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active', 'red', 'green', 'yellow', 'blue'));
    }

    async function sendPushNotification(title, body) {
        if (SERVER_KEY.includes("GELECEK")) return;
        const tokensSnap = await db.ref('tokens').once('value');
        const tokens = tokensSnap.val();
        if (!tokens) return;

        Object.keys(tokens).forEach(token => {
            fetch('https://fcm.googleapis.com/fcm/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'key=' + SERVER_KEY },
                body: JSON.stringify({ 
                    to: token, 
                    notification: { title, body, icon: "logo.png", click_action: window.location.href, sound: "default" },
                    priority: "high"
                })
            });
        });
    }

    async function sendManualNotification() {
        const msg = document.getElementById('manualNotifyBody').value;
        if (!msg) return;
        await sendPushNotification("Duyuru", msg);
        alert("Bildirim fırlatıldı!");
        document.getElementById('manualNotifyBody').value = "";
    }

    function togglePin(id, current) { if(isAdmin) db.ref('tasks').child(id).update({isPinned: !current}); }
    function deleteTask(id) { if(isAdmin && confirm('Silinsin mi?')) db.ref('tasks').child(id).remove(); }

    function render() {
        const list = document.getElementById('taskList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        tasks.filter(t => t.title.toLowerCase().includes(search))
        .sort((a,b) => (b.isPinned - a.isPinned) || (b.id > a.id ? 1 : -1))
        .forEach(item => {
            const div = document.createElement('div');
            div.className = `task-item ${item.isPinned ? 'pinned' : ''}`;
            div.onclick = () => togglePin(item.id, item.isPinned);
            div.innerHTML = `
                <div class="task-info">
                    <span class="task-title">
                        ${item.isPinned ? '📌 ' : ''}
                        ${item.group ? `<span class="group-tag tag-${item.groupColor}">${item.group}</span>` : ''}${item.title}
                    </span>
                    <div class="meta-data"><span>${item.created}</span> ${item.time ? `<span style="color:var(--accent); margin-left:10px;">🔔 ${item.time.replace('T', ' ')}</span>` : ''}</div>
                </div>
                ${isAdmin ? `<button onclick="event.stopPropagation(); deleteTask('${item.id}')" style="width:auto; background:transparent; border:none; color:red; font-weight:bold; cursor:pointer;">✕</button>` : ''}
            `;
            list.appendChild(div);
        });
    }
</script>
</body>
            </html>
